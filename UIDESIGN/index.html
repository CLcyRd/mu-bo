<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影博物馆</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 
         * ==========================================
         *  Color Palette & Design System (V3.0)
         *  Ref: DESIGN.md
         * ==========================================
         */
        :root {
            /* Light Theme (Default - Bright) */
            --bg-body: #F0F2F5;       /* High Brightness Background */
            --bg-surface: #f6f8e1;    /* Pure White Surface */
            --bg-simulator: #2b3a6b;  /* Device Background */
            --text-primary: #1A1A1A;  /* Dark Grey for high contrast */
            --text-secondary: #5F6368;/* Medium Grey */
            --border-color: #E0E0E0;
            
            /* Accent: Emerald Green (#00C853) */
            --accent-color: #3a60a7;  /* Pantone 347C approx */
            --accent-light: rgba(143, 192, 9, 0.1);
            --accent-hover: rgba(0, 200, 83, 0.15);
            --accent-fg: #ffffff;     /* Text on accent bg (large text/icons) */
            
            /* Status */
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Theme */
                --bg-body: #000000;
                --bg-surface: #1E1E1E;
                --bg-simulator: #121212;
                --text-primary: #E0E0E0;
                --text-secondary: #A0A0A0;
                --border-color: #333333;
                
                --shadow-sm: 0 4px 12px rgba(0,0,0,0.3);
                --shadow-md: 0 8px 24px rgba(0,0,0,0.5);
            }
        }

        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { 
            background-color: var(--bg-body); 
            color: var(--text-primary);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
            transition: background-color 0.3s ease;
        }

        /* Device Simulator */
        .device-simulator {
            width: 375px;        /* iPhone Standard Width */
            height: 812px;       /* iPhone Standard Height */
            background: var(--bg-simulator);
            border-radius: 40px;
            box-shadow: var(--shadow-md), inset 0 0 0 8px rgba(0,0,0,0.1); /* Subtle frame */
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        /* Status Bar */
        .status-bar { height: 30px; }
        .notch { 
            width: 120px; height: 25px; 
            background: #000; /* Notch is always black usually, or dark */
            border-radius: 0 0 15px 15px; 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
            z-index: 100;
        }

        /* Header */
        .header { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .title h1 { 
            font-size: 28px; 
            color: var(--text-primary); 
            font-weight: 700; 
            letter-spacing: 0.5px; 
        }
        .title p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .avatar { 
            width: 40px; height: 40px; 
            background: var(--bg-surface); 
            border: 1px solid var(--border-color);
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            color: var(--accent-color);
            box-shadow: var(--shadow-sm);
        }

        /* Carousel (Unchanged Logic, Updated Styles) */
        .carousel-container { 
            margin: 20px; 
            width: 335px; 
            height: 180px;
            overflow: hidden; 
            border-radius: 20px; 
            box-shadow: var(--shadow-md);
            position: relative;
        }
        .carousel-track { 
            display: flex; 
            width: 500%; 
            height: 100%;
            /* 
               Updated to 16s to maintain per-slide dwell time (4s per cycle segment).
               Previously 12s for 5 segments (2.4s). Now 16s for 4 segments (4s) might be too slow.
               Let's keep 12s. 12s / 4 = 3s per slide. 
            */
            animation: loopSlide 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }
        .banner { 
            width: 20%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
            position: relative;
        }
        .banner::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        }
        .banner-text { position: absolute; bottom: 20px; left: 20px; color: #fff; z-index: 2; }
        .banner-text h3 { font-size: 18px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* 
           Smooth Infinite Loop Keyframes (V3.1)
           - Eliminates the "rewind" from 95%->100%
           - Ends at -80% (Clone), loops instantly to 0% (Real)
        */
        @keyframes loopSlide {
            0%, 20% { transform: translateX(0); }       /* Slide 1 */
            25%, 45% { transform: translateX(-20%); }   /* Slide 2 */
            50%, 70% { transform: translateX(-40%); }   /* Slide 3 */
            75%, 95% { transform: translateX(-60%); }   /* Slide 4 */
            100% { transform: translateX(-80%); }       /* Slide 1 (Clone) -> Loop */
        }

        /* Navigation Grid */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .nav-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 20px 15px; text-align: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .nav-item:hover { 
            background: var(--bg-surface);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        } 
        .nav-item:active { transform: scale(0.98); }
        
        .nav-icon { 
            width: 50px; height: 50px; margin: 0 auto 12px; border-radius: 14px;
            background: var(--accent-light);
            color: var(--accent-color); 
            display: flex; justify-content: center; align-items: center; font-size: 22px;
            transition: all 0.3s ease;
        }
        .nav-item:hover .nav-icon {
            background: var(--accent-color);
            color: var(--accent-fg);
        }

        .nav-item h4 { color: var(--text-primary); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .nav-item p { color: var(--text-secondary); font-size: 12px; }

        /* Design Notes */
        .design-notes {
            margin: auto 20px 25px; padding: 20px; 
            background: var(--bg-surface);
            border-radius: 16px; 
            border-left: 4px solid var(--accent-color);
            box-shadow: var(--shadow-sm);
        }
        .design-notes h4 { color: var(--accent-color); font-size: 14px; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .design-notes ul { color: var(--text-secondary); font-size: 12px; line-height: 1.6; padding-left: 15px; }
        .design-notes li { margin-bottom: 6px; }
        .design-notes b { color: var(--text-primary); }

        /* Home Indicator */
        .home-indicator { 
            width: 130px; height: 5px; 
            background: var(--text-secondary); 
            opacity: 0.3;
            border-radius: 3px; 
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); 
        }
    </style>
</head>
<body>

    <div class="device-simulator">
        <div class="notch"></div>
        <div class="status-bar"></div>

        <div class="header">
            <div class="title">
                <h1 style="color: #d8cb18">谢晋故居</h1>

            </div>

        </div>

        <div class="carousel-container">
            <div class="carousel-track">
                <div class="banner" style="background-image: url('museum_img/f9c3cb52f1859ff33b569b6024773334.jpg');">

                </div>
                <div class="banner" style="background-image: url('museum_img/7f28e5732e1916bc8d48645ae3b33299.jpg');">
                    <!-- <div class="banner-text"><h3>本月特展：科幻百年</h3></div> -->
                </div>
                <div class="banner" style="background-image: url('museum_img/eb9d69490f1ea168c46078c50544e1de.jpg');">
                    <!-- <div class="banner-text"><h3>经典放映机展</h3></div> -->
                </div>
                <div class="banner" style="background-image: url('museum_img/b880576a8e57193e054f4abf4c94e7d8.jpg');">
                    <!-- <div class="banner-text"><h3>光影建筑美学</h3></div> -->
                </div>
                <div class="banner" style="background-image: url('museum_img/62ff29be24a9748931d6e4f1854338c8.jpg');">
                    <!-- <div class="banner-text"><h3>胶片时代的记忆</h3></div> -->
                </div>
            </div>
        </div>

        <div class="nav-grid">
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-map-signs"></i></div>
                <h4>参观导览</h4>
                <p>Visitor Information</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-ticket-alt"></i></div>
                <h4>点击预约</h4>
                <p>Visit Booking</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-newspaper"></i></div>
                <h4>最新资讯</h4>
                <p>Latest News</p>

            <div class="nav-item">

                <p>Be a volunteer</p>
            </div>
        </div>

        <!-- <div class="design-notes">
        </div> -->

    </div>

</body>
</html>
