<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>谢晋故居小程序主页 - 视频融入方案</title>
<style>
  :root {
    --blue: #263d78;
    --blue2: #20366c;
    --yellow: #e9ea30;
    --cream: #fbfde9;
    --muted: rgba(255,255,255,.58);
    --ink: #111827;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 18% 18%, rgba(233,234,48,.12), transparent 26%),
      radial-gradient(circle at 86% 72%, rgba(255,255,255,.14), transparent 22%),
      linear-gradient(135deg, #10192f, #31416f 52%, #17213f);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: #fff;
    overflow-x: hidden;
  }
  .stage {
    width: min(100vw, 980px);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 34px 18px;
  }
  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 48px;
    padding: 14px;
    background: #101827;
    box-shadow: 0 40px 110px rgba(0,0,0,.42), inset 0 0 0 1px rgba(255,255,255,.08);
  }
  .screen {
    position: relative;
    height: 100%;
    overflow: hidden;
    border-radius: 38px;
    background: linear-gradient(180deg, #293e78 0%, #253b72 64%, #223569 100%);
  }
  .status {
    height: 44px;
    padding: 13px 22px 0;
    display: flex;
    justify-content: space-between;
    align-items: start;
    font-weight: 700;
    letter-spacing: .4px;
    font-size: 16px;
  }
  .signal { display: flex; gap: 5px; align-items: center; opacity: .95; }
  .dotbar { display:flex; gap:3px; align-items:end; height:17px; }
  .dotbar i { width:4px; border-radius: 6px; background:white; display:block; }
  .dotbar i:nth-child(1){height:6px} .dotbar i:nth-child(2){height:9px} .dotbar i:nth-child(3){height:12px} .dotbar i:nth-child(4){height:15px}
  .battery { height: 14px; min-width: 27px; border-radius: 6px; background: rgba(255,255,255,.86); color: #334; font-size: 10px; display:grid; place-items:center; padding:0 4px; }
  .nav {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 42px;
    font-size: 21px;
    font-weight: 700;
  }
  .capsule {
    position: absolute;
    right: 18px;
    top: 3px;
    height: 35px;
    width: 88px;
    border-radius: 22px;
    background: rgba(12,24,55,.35);
    display: flex;
    align-items: center;
    justify-content: space-around;
    backdrop-filter: blur(8px);
  }
  .capsule span:first-child { font-size: 23px; line-height: 0; transform: translateY(-5px); }
  .capsule span:last-child { width:22px;height:22px;border:3px solid rgba(255,255,255,.82);border-radius:50%;display:block; }
  .content { padding: 18px 22px 0; }
  .title {
    margin-top: 4px;
    font-size: 34px;
    line-height: 1;
    color: var(--yellow);
    font-weight: 900;
    letter-spacing: 1px;
  }
  .subtitle {
    margin-top: 10px;
    color: var(--yellow);
    opacity: .92;
    font-weight: 700;
    font-size: 17px;
  }
  .hero { margin-top: 22px; position: relative; }
  .carousel {
    position: relative;
    width: 100%;
    height: 198px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 18px 26px rgba(0,0,0,.16);
    background: #101827;
  }
  .track { display: flex; height: 100%; transition: transform .5s cubic-bezier(.22,.9,.3,1); touch-action: pan-y; }
  .slide { min-width: 100%; height: 100%; position: relative; overflow: hidden; user-select: none; }
  .photo {
    height: 100%;
    background-size: cover;
    background-position: center;
  }
  .photo.one { background: linear-gradient(135deg, rgba(0,0,0,.1), rgba(0,0,0,.25)), radial-gradient(circle at 24% 34%, #f8e9cf 0 8%, transparent 9%), radial-gradient(circle at 50% 28%, #fff2dc 0 13%, transparent 14%), linear-gradient(90deg, #e7dcc6, #ba9973 52%, #7f634e); }
  .photo.two { background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.2)), repeating-linear-gradient(90deg, #16191d 0 44px, #f4edd9 44px 72px, #17191c 72px 106px); }
  .photo.three { background: linear-gradient(150deg, rgba(255,255,255,.2), rgba(0,0,0,.32)), radial-gradient(circle at 70% 35%, #f5d76e 0 8%, transparent 9%), linear-gradient(130deg, #485c88, #202f5c 48%, #f1efe0); }
  .caption {
    position: absolute;
    left: 16px;
    bottom: 14px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,.36);
    backdrop-filter: blur(10px);
    font-size: 13px;
    font-weight: 700;
  }
  .video-cover {
    height: 100%;
    cursor: pointer;
    background:
      linear-gradient(180deg, rgba(6,10,24,.12), rgba(6,10,24,.62)),
      radial-gradient(circle at 28% 25%, rgba(233,234,48,.46), transparent 17%),
      linear-gradient(135deg, #6277a8, #1b2d60 44%, #cbb990);
  }
  .video-cover:before {
    content:"";
    position:absolute;
    inset:24px 28px 28px;
    border-radius:16px;
    border: 1px solid rgba(255,255,255,.24);
    background: linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
  }
  .play {
    position: absolute;
    left: 50%; top: 47%; transform: translate(-50%, -50%);
    width: 66px; height: 66px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,.9);
    box-shadow: 0 14px 34px rgba(0,0,0,.24);
    display: grid;
    place-items: center;
    cursor: pointer;
  }
  .play:after {
    content:"";
    margin-left: 5px;
    width: 0; height: 0;
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    border-left: 22px solid #2b65ab;
  }
  .video-title {
    position:absolute; left:18px; bottom:18px;
  }
  .video-title b { display:block; font-size:19px; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.45); }
  .video-title small { display:block; margin-top:3px; font-size:12px; color:rgba(255,255,255,.78); }
  .hint { position:absolute; right: 14px; bottom: 16px; font-size: 12px; padding: 6px 10px; border-radius:999px; background: rgba(255,255,255,.16); }
  .dots {
    position: absolute;
    left: 50%;
    bottom: -18px;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }
  .dots button { width:6px; height:6px; padding:0; border:0; border-radius:50%; background:rgba(255,255,255,.38); cursor:pointer; }
  .dots button.active { width:17px; border-radius:999px; background:var(--yellow); }
  .grid {
    margin-top: 42px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .tile {
    height: 147px;
    border-radius: 18px;
    background: var(--cream);
    color: #161616;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 18px rgba(0,0,0,.06);
  }
  .icon {
    width: 58px; height: 58px;
    border-radius: 18px;
    background: #f1f8cf;
    display:grid;
    place-items:center;
    margin-bottom: 15px;
  }
  .icon svg { width: 32px; height: 32px; stroke:#3469aa; stroke-width:2.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .tile b { font-size: 19px; margin-bottom: 5px; }
  .tile span { color:#646464; font-size: 14px; }
  .tabbar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 80px;
    border-top: 1px solid rgba(255,255,255,.12);
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    background: rgba(33,53,105,.72);
  }
  .tab { text-align: center; color: rgba(255,255,255,.45); font-weight:700; font-size:17px; }
  .tab.active { color: var(--yellow); }
  .note {
    position:absolute;
    left:50%; transform:translateX(-50%);
    bottom:-54px;
    width: 390px;
    text-align:center;
    color:rgba(255,255,255,.72);
    font-size: 13px;
  }
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(4,8,20,.92);
    padding: 24px;
  }
  .modal.show { display: flex; }
  .video-shell {
    position: relative;
    width: min(980px, 96vw);
    border-radius: 22px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 35px 100px rgba(0,0,0,.55);
  }
  .video-shell video { width: 100%; display:block; aspect-ratio: 16/9; background:#000; }
  .close {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 44px; height: 44px;
    border:0;
    border-radius: 50%;
    color:white;
    background:rgba(255,255,255,.14);
    font-size: 25px;
    cursor:pointer;
    backdrop-filter: blur(10px);
  }
  .fs-tip {
    position: fixed;
    left: 24px; top: 28px;
    color: rgba(255,255,255,.72);
    font-size: 14px;
  }
  @media (max-width: 480px) {
    .stage { padding: 0; }
    .phone { transform: scale(.92); }
    .note { display:none; }
  }
</style>
</head>

<script>
  const track = document.getElementById('track');
  const slides = Array.from(track.children);
  const dots = document.getElementById('dots');
  let index = 0, timer, startX = 0, currentX = 0, dragging = false;

  slides.forEach((_, i) => {
    const b = document.createElement('button');
    b.setAttribute('aria-label', `切换到第${i + 1}屏`);
    b.addEventListener('click', () => go(i));
    dots.appendChild(b);
  });
  const dotBtns = Array.from(dots.children);

  function go(i) {
    index = (i + slides.length) % slides.length;
    track.style.transform = `translateX(${-index * 100}%)`;
    dotBtns.forEach((d, n) => d.classList.toggle('active', n === index));
  }
  function auto() { clearInterval(timer); timer = setInterval(() => go(index + 1), 3600); }
  go(0); auto();

  const carousel = document.getElementById('carousel');
  carousel.addEventListener('pointerdown', e => {
    dragging = true; startX = e.clientX; currentX = startX; clearInterval(timer);
    track.style.transition = 'none';
    carousel.setPointerCapture(e.pointerId);
  });
  carousel.addEventListener('pointermove', e => {
    if (!dragging) return;
    currentX = e.clientX;
    const dx = currentX - startX;
    track.style.transform = `translateX(calc(${-index * 100}% + ${dx}px))`;
  });
  carousel.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    track.style.transition = 'transform .5s cubic-bezier(.22,.9,.3,1)';
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 46) go(index + (dx < 0 ? 1 : -1)); else go(index);
    auto();
  });
  carousel.addEventListener('pointercancel', () => { dragging = false; go(index); auto(); });

  const modal = document.getElementById('modal');
  const openVideo = document.getElementById('openVideo');
  const closeBtn = document.getElementById('close');
  const video = document.getElementById('video');
  const videoShell = document.getElementById('videoShell');

  async function openModal() {
    modal.classList.add('show');
    modal.setAttribute('aria-hidden', 'false');
    video.currentTime = 0;
    try { await video.play(); } catch(e) {}
    try {
      if (videoShell.requestFullscreen) await videoShell.requestFullscreen();
      else if (video.requestFullscreen) await video.requestFullscreen();
    } catch(e) {}
  }
  function closeModal() {
    video.pause();
    modal.classList.remove('show');
    modal.setAttribute('aria-hidden', 'true');
    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  }
  openVideo.addEventListener('click', openModal);
  openVideo.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(); });
  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  window.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('show')) closeModal(); });
</script>
