<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影博物馆 - 淡紫版</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 
         * ==========================================
         *  Color Palette & Design System (V3.2 - Lavender)
         *  Based on index.html layout
         * ==========================================
         */
        :root {
            /* Light Theme (Default - Bright Lavender) */
            --bg-body: #F8F7FC;       /* Very Light Lavender Background */
            --bg-surface: #FFFFFF;    /* Pure White Surface */
            --bg-simulator: #b79bdb;  /* Device Background */
            --text-primary: #10094d;  /* Deep Purple-Grey for high contrast */
            --text-secondary: #151061;/* Medium Purple-Grey */
            --border-color: #E6E1F0;
            
            /* Accent: Lavender Purple (#9C27B0) */
            --accent-color: #9C27B0;  
            --accent-light: rgba(156, 39, 176, 0.1);
            --accent-hover: rgba(156, 39, 176, 0.15);
            --accent-fg: #FFFFFF;     
            
            /* Status */
            --shadow-sm: 0 4px 12px rgba(156, 39, 176, 0.05);
            --shadow-md: 0 8px 24px rgba(156, 39, 176, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Theme (Deep Purple) */
                --bg-body: #120F1A;
                --bg-surface: #1E1A26;
                --bg-simulator: #18141F;
                --text-primary: #E6E1F0;
                --text-secondary: #A69EB5;
                --border-color: #352E40;
                
                --shadow-sm: 0 4px 12px rgba(0,0,0,0.4);
                --shadow-md: 0 8px 24px rgba(0,0,0,0.6);
            }
        }

        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { 
            background-color: var(--bg-body); 
            color: var(--text-primary);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
            transition: background-color 0.3s ease;
        }

        /* Device Simulator */
        .device-simulator {
            width: 375px;        
            height: 812px;       
            background: var(--bg-simulator);
            border-radius: 40px;
            box-shadow: var(--shadow-md), inset 0 0 0 8px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        /* Status Bar */
        .status-bar { height: 30px; }
        .notch { 
            width: 120px; height: 25px; 
            background: #000; 
            border-radius: 0 0 15px 15px; 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
            z-index: 100;
        }

        /* Header */
        .header { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .title h1 { 
            font-size: 24px; 
            color: var(--text-primary); 
            font-weight: 700; 
            letter-spacing: 0.5px; 
        }
        .title p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .avatar { 
            width: 40px; height: 40px; 
            background: var(--bg-surface); 
            border: 1px solid var(--border-color);
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            color: var(--accent-color);
            box-shadow: var(--shadow-sm);
        }

        /* Carousel */
        .carousel-container { 
            margin: 20px; 
            width: 335px; 
            height: 180px;
            overflow: hidden; 
            border-radius: 20px; 
            box-shadow: var(--shadow-md);
            position: relative;
        }
        .carousel-track { 
            display: flex; 
            width: 500%; 
            height: 100%;
            animation: loopSlide 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }
        .banner { 
            width: 20%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
            position: relative;
        }
        .banner::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(20, 10, 30, 0.8), transparent);
        }
        .banner-text { position: absolute; bottom: 20px; left: 20px; color: #fff; z-index: 2; }
        .banner-text h3 { font-size: 18px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        @keyframes loopSlide {
            0%, 20% { transform: translateX(0); }       
            25%, 45% { transform: translateX(-20%); }   
            50%, 70% { transform: translateX(-40%); }   
            75%, 95% { transform: translateX(-60%); }   
            100% { transform: translateX(-80%); }       
        }

        /* Navigation Grid */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .nav-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 20px 15px; text-align: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .nav-item:hover { 
            background: var(--bg-surface);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        } 
        .nav-item:active { transform: scale(0.98); }
        
        .nav-icon { 
            width: 50px; height: 50px; margin: 0 auto 12px; border-radius: 14px;
            background: var(--accent-light);
            color: var(--accent-color); 
            display: flex; justify-content: center; align-items: center; font-size: 22px;
            transition: all 0.3s ease;
        }
        .nav-item:hover .nav-icon {
            background: var(--accent-color);
            color: var(--accent-fg);
        }

        .nav-item h4 { color: var(--text-primary); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .nav-item p { color: var(--text-secondary); font-size: 12px; }

        /* Home Indicator */
        .home-indicator { 
            width: 130px; height: 5px; 
            background: var(--text-secondary); 
            opacity: 0.3;
            border-radius: 3px; 
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); 
        }
    </style>
</head>
<body>

    <div class="device-simulator">
        <div class="notch"></div>
        <div class="status-bar"></div>

        <div class="header">
            <div class="title">
                <h1 style="font-size: 28px;">谢晋故居</h1>
                <p>上海谢晋电影艺术基金会</p>
            </div>
        </div>

        <div class="carousel-container">
            <div class="carousel-track">
                <div class="banner" style="background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');">
                    <div class="banner-text"><h3>胶片时代的记忆</h3></div>
                </div>
                <div class="banner" style="background-image: url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');">
                    <div class="banner-text"><h3>本月特展：科幻百年</h3></div>
                </div>
                <div class="banner" style="background-image: url('https://images.unsplash.com/photo-1594917544320-9118c86d8b67?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');">
                    <div class="banner-text"><h3>经典放映机展</h3></div>
                </div>
                <div class="banner" style="background-image: url('https://images.unsplash.com/photo-1579751626657-72bc17010498?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');">
                    <div class="banner-text"><h3>光影建筑美学</h3></div>
                </div>
                <div class="banner" style="background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');">
                    <div class="banner-text"><h3>胶片时代的记忆</h3></div>
                </div>
            </div>
        </div>

        <div class="nav-grid">
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-map-signs"></i></div>
                <h4>参观须知</h4>
                <p>Visitor Information</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-ticket-alt"></i></div>
                <h4>点击预约</h4>
                <p>Visit Booking</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-newspaper"></i></div>
                <h4>最新资讯</h4>
                <p>Latest News</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-gift"></i></div>
                <h4>文创小铺</h4>
                <p>Creative Products</p>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>

</body>
</html>
