<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文创产品展示</title>
    <style>
        :root {
            --bg-body: #eef1f4;
            --device-shell: #26365f;
            --screen-bg: #f7f8ee;
            --surface: #ffffff;
            --text-primary: #1f242d;
            --text-secondary: #637083;
            --border: #dde3ea;
            --accent: #2d65b3;
            --accent-soft: #e8f0fb;
            --green: #5e8b6b;
            --orange: #d48248;
            --shadow-sm: 0 6px 18px rgba(25, 36, 58, 0.08);
            --shadow-md: 0 12px 30px rgba(25, 36, 58, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .device-simulator {
            width: 375px;
            height: 812px;
            background: var(--device-shell);
            border-radius: 40px;
            box-shadow: var(--shadow-md), inset 0 0 0 8px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            flex-direction: column;
        }

        .notch {
            width: 120px;
            height: 25px;
            background: #000;
            border-radius: 0 0 15px 15px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .status-bar {
            height: 30px;
            flex: 0 0 auto;
        }

        .content-area {
            flex: 1;
            background: var(--screen-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            padding: 34px 20px 18px;
            background: var(--device-shell);
            color: #fff;
            flex: 0 0 auto;
        }

        .page-kicker {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.72);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 25px;
            line-height: 1.25;
            letter-spacing: 0;
            font-weight: 750;
        }

        .page-subtitle {
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.78);
        }

        .product-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 16px 14px 30px;
        }

        .product-list::-webkit-scrollbar {
            display: none;
        }

        .product-card {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 14px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 118px minmax(0, 1fr);
            min-height: 160px;
            color: inherit;
            text-decoration: none;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .product-card:hover,
        .product-card:focus-visible {
            border-color: var(--accent);
            box-shadow: 0 10px 22px rgba(45, 101, 179, 0.14);
            outline: none;
        }

        .product-card:active {
            transform: scale(0.985);
        }

        .product-image {
            width: 118px;
            height: 160px;
            background: #f1f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-copy {
            min-width: 0;
            padding: 14px 13px 13px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
        }

        .product-title-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
        }

        .product-title {
            font-size: 18px;
            line-height: 1.25;
            font-weight: 760;
        }

        .product-count {
            flex: 0 0 auto;
            color: var(--accent);
            font-size: 12px;
            font-weight: 650;
        }

        .product-desc {
            font-size: 13px;
            line-height: 1.45;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 7px;
            min-height: 22px;
            flex-wrap: wrap;
        }

        .swatch {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px rgba(31, 36, 45, 0.16);
            flex: 0 0 auto;
        }

        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .product-meta {
            color: var(--text-secondary);
            font-size: 12px;
            white-space: nowrap;
        }

        .detail-button {
            border: 0;
            background: var(--accent);
            color: #fff;
            border-radius: 8px;
            height: 34px;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 680;
            line-height: 34px;
            white-space: nowrap;
        }

        .home-indicator {
            width: 130px;
            height: 5px;
            background: rgba(255, 255, 255, 0.34);
            border-radius: 3px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="device-simulator">
        <div class="notch"></div>
        <div class="status-bar"></div>

        <div class="content-area">
            <header class="page-header">
                <div class="page-kicker">MUSEUM STORE</div>
                <h1>文创产品展示</h1>
                <p class="page-subtitle">选择产品种类，查看对应颜色与产品信息。</p>
            </header>

            <main class="product-list" aria-label="产品种类">
                <a class="product-card" href="product-detail.html?product=tshirt" aria-label="查看T恤详情">
                    <div class="product-image">
                        <img src="img/tshirt_black.jpg" alt="黑色T恤">
                    </div>
                    <div class="product-copy">
                        <div>
                            <div class="product-title-row">
                                <h2 class="product-title">T恤</h2>
                                <span class="product-count">3色</span>
                            </div>
                            <p class="product-desc">300g纯棉双纱紧密赛络纺，OVERSIZE宽松版型。</p>
                        </div>
                        <div class="color-row" aria-label="T恤颜色">
                            <span class="swatch" style="background:#1d1d1f;" title="黑色"></span>
                            <span class="swatch" style="background:#4f5357;" title="深灰"></span>
                            <span class="swatch" style="background:#c8c9c7;" title="浅灰"></span>
                        </div>
                        <div class="action-row">
                            <span class="product-meta">M-L-XL-XXL</span>
                            <span class="detail-button">查看详情</span>
                        </div>
                    </div>
                </a>

                <a class="product-card" href="product-detail.html?product=vest" aria-label="查看马甲详情">
                    <div class="product-image">
                        <img src="img/vest_black.jpg" alt="黑色马甲">
                    </div>
                    <div class="product-copy">
                        <div>
                            <div class="product-title-row">
                                <h2 class="product-title">马甲</h2>
                                <span class="product-count">2色</span>
                            </div>
                            <p class="product-desc">多功能马甲，后背可脱卸，速干透气。</p>
                        </div>
                        <div class="color-row" aria-label="马甲颜色">
                            <span class="swatch" style="background:#111214;" title="黑色"></span>
                            <span class="swatch" style="background:#8c8f91;" title="灰色"></span>
                        </div>
                        <div class="action-row">
                            <span class="product-meta">S-M-L-XL</span>
                            <span class="detail-button">查看详情</span>
                        </div>
                    </div>
                </a>

                <a class="product-card" href="product-detail.html?product=cap" aria-label="查看帽子详情">
                    <div class="product-image">
                        <img src="img/cap_beige_purple.jpg" alt="米紫帽子">
                    </div>
                    <div class="product-copy">
                        <div>
                            <div class="product-title-row">
                                <h2 class="product-title">帽子</h2>
                                <span class="product-count">4色</span>
                            </div>
                            <p class="product-desc">速干材质，吸湿快干、透气防晒。</p>
                        </div>
                        <div class="color-row" aria-label="帽子颜色">
                            <span class="swatch" style="background:linear-gradient(135deg,#d7c9af 50%,#6d5aa7 50%);" title="米紫"></span>
                            <span class="swatch" style="background:linear-gradient(135deg,#d7c9af 50%,#e6c94b 50%);" title="米黄"></span>
                            <span class="swatch" style="background:linear-gradient(135deg,#1b1d1e 50%,#4b8a54 50%);" title="黑绿"></span>
                            <span class="swatch" style="background:linear-gradient(135deg,#9c9fa3 50%,#f0f1ef 50%);" title="灰白"></span>
                        </div>
                        <div class="action-row">
                            <span class="product-meta">头围56-58cm</span>
                            <span class="detail-button">查看详情</span>
                        </div>
                    </div>
                </a>

                <a class="product-card" href="product-detail.html?product=cup" aria-label="查看水杯详情">
                    <div class="product-image">
                        <img src="img/cup_red.jpg" alt="红色水杯">
                    </div>
                    <div class="product-copy">
                        <div>
                            <div class="product-title-row">
                                <h2 class="product-title">水杯</h2>
                                <span class="product-count">7色</span>
                            </div>
                            <p class="product-desc">双层不锈钢防烫隔冷，255ML容量。</p>
                        </div>
                        <div class="color-row" aria-label="水杯颜色">
                            <span class="swatch" style="background:#171819;" title="黑色"></span>
                            <span class="swatch" style="background:#2e6bb7;" title="蓝色"></span>
                            <span class="swatch" style="background:#49875a;" title="绿色"></span>
                            <span class="swatch" style="background:#de7c2d;" title="橙色"></span>
                            <span class="swatch" style="background:#7753a6;" title="紫色"></span>
                            <span class="swatch" style="background:#ba3931;" title="红色"></span>
                            <span class="swatch" style="background:#e6c542;" title="黄色"></span>
                        </div>
                        <div class="action-row">
                            <span class="product-meta">255ML</span>
                            <span class="detail-button">查看详情</span>
                        </div>
                    </div>
                </a>
            </main>
        </div>

        <div class="home-indicator"></div>
    </div>
</body>
</html>
