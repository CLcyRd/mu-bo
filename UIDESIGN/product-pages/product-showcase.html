<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文创产品展示</title>
  <style>
    :root {
      --bg-body: #F0F2F5;
      --bg-surface: #f6f8e1;
      --bg-card: #ffffff;
      --bg-simulator: #2b3a6b;
      --bg-simulator-deep: #17224b;
      --text-primary: #1A1A1A;
      --text-secondary: #69727d;
      --border-color: rgba(25, 37, 74, .12);
      --accent-color: #3a60a7;
      --accent-dark: #24417d;
      --accent-soft: rgba(58, 96, 167, .10);
      --lime-soft: #f6f8e1;
      --accent-fg: #ffffff;
      --shadow-sm: 0 8px 22px rgba(9, 20, 54, .08);
      --shadow-md: 0 20px 46px rgba(6, 15, 46, .20);
      --radius-xl: 24px;
      --radius-lg: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; }
    body {
      background: radial-gradient(circle at 20% 15%, rgba(58, 96, 167, .12), transparent 30%), var(--bg-body);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .device-simulator {
      width: 375px;
      height: 812px;
      background: linear-gradient(180deg, var(--bg-simulator) 0%, var(--bg-simulator-deep) 100%);
      border-radius: 40px;
      box-shadow: var(--shadow-md), inset 0 0 0 8px rgba(0,0,0,.1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,.25);
    }

    .notch {
      width: 120px;
      height: 25px;
      background: #000;
      border-radius: 0 0 15px 15px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }

    .status-bar {
      height: 42px;
      padding: 9px 26px 0;
      color: rgba(255,255,255,.92);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2px;
      position: relative;
      z-index: 20;
    }
    .status-icons { display: flex; gap: 5px; align-items: center; opacity: .9; }
    .battery { width: 18px; height: 9px; border: 1.5px solid currentColor; border-radius: 3px; position: relative; }
    .battery::after { content: ""; position: absolute; right: -4px; top: 2px; width: 2px; height: 4px; background: currentColor; border-radius: 1px; }
    .battery::before { content: ""; position: absolute; inset: 2px 4px 2px 2px; background: currentColor; border-radius: 1px; }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .hero-header {
      padding: 10px 16px 12px;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    .top-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,.65);
      font-weight: 800;
    }

    .hero-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
    }

    .hero-title h1 {
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: -1px;
      font-weight: 850;
    }

    .hero-title p {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.55;
      color: rgba(255,255,255,.74);
      max-width: 252px;
    }

    .hero-count {
      min-width: 68px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 9px 10px;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    .hero-count strong { display:block; font-size: 20px; line-height: 1; }
    .hero-count span { display:block; font-size: 10px; color: rgba(255,255,255,.68); margin-top: 4px; }

    .search-bar {
      margin-top: 16px;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 16px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 22px rgba(4, 12, 33, .16);
    }

    .search-bar svg { color: var(--accent-color); flex: 0 0 auto; }
    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      width: 100%;
    }
    .search-bar input::placeholder { color: #8c96a3; }

    .category-tabs {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.74);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: .2s ease;
    }
    .tab-btn.active {
      color: var(--accent-dark);
      background: var(--lime-soft);
      border-color: transparent;
      box-shadow: 0 8px 16px rgba(0,0,0,.12);
    }

    .product-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 28px;
      scrollbar-width: none;
      overscroll-behavior: contain;
    }
    .product-scroll::-webkit-scrollbar { display: none; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255,255,255,.92);
      margin: 4px 0 12px;
    }
    .section-title h2 { font-size: 15px; letter-spacing: .2px; }
    .section-title span { font-size: 11px; color: rgba(255,255,255,.55); }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .product-card {
      background: linear-gradient(180deg, #fff 0%, var(--bg-surface) 100%);
      border-radius: var(--radius-xl);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.82);
      box-shadow: var(--shadow-sm);
      min-height: 264px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      position: relative;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 18px 30px rgba(0,0,0,.16); border-color: rgba(58,96,167,.45); }
    .product-card:active { transform: scale(.98); }

    .media-wrap {
      height: 120px;
      margin: 10px 10px 0;
      border-radius: 20px;
      background: #f7f8f2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .media-wrap::after {
      content: "";
      position: absolute;
      inset: auto 12% 10px;
      height: 10px;
      background: rgba(29, 45, 84, .10);
      filter: blur(9px);
      border-radius: 50%;
    }
    .media-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 6px;
      position: relative;
      z-index: 1;
      transition: transform .28s ease;
    }
    .product-card:hover .media-wrap img { transform: scale(1.035); }

    .product-body { padding: 12px 12px 14px; flex: 1; display: flex; flex-direction: column; }
    .meta-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tag {
      font-size: 10px;
      color: var(--accent-dark);
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 5px 8px;
      font-weight: 800;
      max-width: 92px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .color-count { font-size: 10px; color: #8b937f; font-weight: 700; }
    .product-name { margin-top: 9px; font-size: 17px; line-height: 1.2; font-weight: 850; color: var(--text-primary); }
    .product-summary {
      margin-top: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 34px;
    }

    .swatches { display: flex; gap: 5px; align-items: center; margin-top: 10px; min-height: 20px; flex-wrap: wrap; }
    .swatch {
      width: 17px;
      height: 17px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.9);
      box-shadow: 0 0 0 1px rgba(26,26,26,.12);
    }
    .detail-link {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: var(--accent-color);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      padding: 10px 12px;
      cursor: pointer;
      transition: .2s ease;
    }
    .detail-link:hover { background: var(--accent-dark); }

    .empty-state {
      display: none;
      color: rgba(255,255,255,.78);
      background: rgba(255,255,255,.10);
      border: 1px dashed rgba(255,255,255,.22);
      border-radius: 20px;
      padding: 22px 18px;
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    .home-indicator {
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,.38);
      border-radius: 3px;
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
    }

    @media (max-width: 430px) {
      body { padding: 0; background: var(--bg-simulator); }
      .device-simulator { width: 100vw; height: 100vh; border-radius: 0; border: 0; box-shadow: none; }
      .notch { display: none; }
    }
  </style>
</head>

  <div class="device-simulator" aria-label="手机视图模拟器">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons"><span>5G</span><span class="battery"></span></div>

      </main>
    </div>

    <div class="home-indicator"></div>
  </div>

    const productList = Object.values(PRODUCTS);
    const grid = document.getElementById('productGrid');
    const emptyState = document.getElementById('emptyState');
    const resultCount = document.getElementById('resultCount');
    const searchInput = document.getElementById('searchInput');
    let activeFilter = 'all';

    function cardTemplate(product) {
      const swatches = product.colors.map(color => `<span class="swatch" title="${color.name}" aria-label="${color.name}" style="background:${color.hex}"></span>`).join('');
      return `
        <article class="product-card" tabindex="0" data-id="${product.id}" aria-label="查看 ${product.name} 详情">
          <div class="media-wrap"><img src="${product.image}" alt="${product.name} 产品图" loading="lazy"></div>
          <div class="product-body">
            <div class="meta-row">
              <span class="color-count">${product.colors.length} 色</span>
            </div>
            <h3 class="product-name">${product.name}</h3>
            <div class="swatches" aria-label="可选颜色">${swatches}</div>
            <a class="detail-link" href="product-detail.html?product=${product.id}" aria-label="进入 ${product.name} 详情页">
              查看详情
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </a>
          </div>
        </article>`;
    }

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = productList.filter(product => {
        const matchesFilter = activeFilter === 'all' || product.filter === activeFilter;
        const haystack = [product.name, product.category, product.badge, product.summary, ...product.colors.map(c => c.name), ...product.specs.flat()].join(' ').toLowerCase();
        return matchesFilter && (!keyword || haystack.includes(keyword));
      });
      grid.innerHTML = filtered.map(cardTemplate).join('');
      emptyState.style.display = filtered.length ? 'none' : 'block';
      resultCount.textContent = `${filtered.length} items`;
      grid.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', event => {
          if (event.target.closest('a')) return;
          location.href = `product-detail.html?product=${card.dataset.id}`;
        });
        card.addEventListener('keydown', event => {
          if (event.key === 'Enter') location.href = `product-detail.html?product=${card.dataset.id}`;
        });
      });
    }

    document.querySelectorAll('.tab-btn').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        activeFilter = button.dataset.filter;
        render();
      });
    });

    searchInput.addEventListener('input', render);
    render();
  </script>
</body>
</html>
