<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影纪元 | 电影博物馆</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { background-color: #e5e5e5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* 移动端设备模拟器 */
        .device-simulator {
            width: 375px;        /* iPhone 标准宽 */
            height: 812px;       /* iPhone 标准高 */
            background: linear-gradient(135deg, #12151C 0%, #080A0E 100%);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 0 0 8px #222;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏模拟 */
        .status-bar { height: 30px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px; }
        .notch { width: 120px; height: 25px; background: #222; border-radius: 0 0 15px 15px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }

        /* 标题区域 */
        .header { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .title h1 { font-size: 22px; color: #E5C07B; font-weight: 600; letter-spacing: 1px; }
        .title p { font-size: 12px; color: #8892B0; margin-top: 4px; }
        .avatar { width: 36px; height: 36px; background: #2C313C; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; }

        /* ====== 更新部分：纯CSS无缝循环自动轮播 ====== */
        .carousel-container { 
            margin: 15px 20px; 
            width: 335px; /* 375px - 左右各20px */
            height: 160px;
            overflow: hidden; 
            border-radius: 16px; /* 外层遮罩圆角 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        .carousel-track { 
            display: flex; 
            /* 计算：4张真实图片 + 1张克隆图片 = 5张。总宽度 500% */
            width: 500%; 
            height: 100%;
            /* 应用无缝循环动画：12秒一个周期，无限循环 */
            animation: loopSlide 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }
        .banner { 
            /* 计算：每张图占总宽度的 1/5 = 20% */
            width: 20%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
            position: relative;
        }
        .banner::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .banner-text { position: absolute; bottom: 15px; left: 15px; color: #fff; z-index: 2; }
        .banner-text h3 { font-size: 16px; font-weight: 500; }

        /* 无缝循环滚动关键帧算法 (针对5张图，每张占20%位移) */
        @keyframes loopSlide {
            0%, 20% { transform: translateX(0); }       /* Slide 1 */
            25%, 45% { transform: translateX(-20%); }   /* Slide 2 */
            50%, 70% { transform: translateX(-40%); }   /* Slide 3 */
            75%, 95% { transform: translateX(-60%); }   /* Slide 4 */
            100% { transform: translateX(-80%); }       /* Slide 1 (Clone) -> Loop */
        }
        /* =========================================== */

        /* 四个导航按钮 */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .nav-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(229, 192, 123, 0.15);
            border-radius: 16px; padding: 20px 15px; text-align: center;
            transition: all 0.3s ease; backdrop-filter: blur(10px); cursor: pointer;
        }
        .nav-item:hover { background: rgba(229, 192, 123, 0.08); } 
        .nav-item:active { transform: scale(0.95); background: rgba(229, 192, 123, 0.15); }
        .nav-icon { 
            width: 48px; height: 48px; margin: 0 auto 12px; border-radius: 12px;
            background: linear-gradient(135deg, rgba(229, 192, 123, 0.2), rgba(229, 192, 123, 0.05));
            color: #E5C07B; display: flex; justify-content: center; align-items: center; font-size: 20px;
        }
        .nav-item h4 { color: #fff; font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .nav-item p { color: #8892B0; font-size: 11px; }

        /* 设计说明区 */
        .design-notes {
            margin: auto 20px 25px; padding: 15px; background: rgba(0, 0, 0, 0.4);
            border-radius: 12px; border-left: 3px solid #E5C07B;
        }
        .design-notes h4 { color: #E5C07B; font-size: 13px; margin-bottom: 6px; }
        .design-notes ul { color: #A0AABF; font-size: 11px; line-height: 1.6; padding-left: 15px; }

        /* 底部操作条模拟 */
        .home-indicator { width: 130px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

    <div class="device-simulator">
        <div class="notch"></div>
        <div class="status-bar"></div>

        <div class="header">
            <div class="title">

            </div>

        </div>

        <div class="carousel-container">
            <div class="carousel-track">
                <div class="banner" style="background-image: url('museum_img/f9c3cb52f1859ff33b569b6024773334.jpg');">
                    <!-- <div class="banner-text"><h3>胶片时代的记忆</h3></div> -->
                </div>
                <div class="banner" style="background-image: url('museum_img/7f28e5732e1916bc8d48645ae3b33299.jpg');">
                    <!-- <div class="banner-text"><h3>本月特展：科幻百年</h3></div> -->
                </div>
                <div class="banner" style="background-image: url('museum_img/eb9d69490f1ea168c46078c50544e1de.jpg');">

                </div>
                <div class="banner" style="background-image: url('museum_img/b880576a8e57193e054f4abf4c94e7d8.jpg');">
                    <!-- <div class="banner-text"><h3>光影建筑美学</h3></div> -->
                </div>
                <div class="banner" style="background-image: url('museum_img/62ff29be24a9748931d6e4f1854338c8.jpg');">
                    <!-- <div class="banner-text"><h3>胶片时代的记忆</h3></div> -->
                </div>
            </div>
        </div>

        <div class="nav-grid">
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-map-signs"></i></div>
                <h4>参观须知</h4>
                <p>Visitor Information</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-ticket-alt"></i></div>
                <h4>点击预约</h4>
                <p>Visit Booking</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-newspaper"></i></div>
                <h4>最新资讯</h4>
                <p>Latest News</p>
            </div>
            <div class="nav-item">
                <div class="nav-icon"><i class="fas fa-gift"></i></div>
                <h4>文创小铺</h4>
                <p>Creative Products</p>
            </div>
        </div>

        <!-- <div class="design-notes">
        </div> -->
        <div class="home-indicator"></div>
    </div>

</body>
</html>
